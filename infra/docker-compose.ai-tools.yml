# AI Tools — Dev Tooling Stack
# Serena (code navigation) + Ollama (local inference) + LiteLLM (Anthropic proxy) + CBM
version: "3.9"

services:

  serena:
    image: ghcr.io/oraios/serena:latest
    pull_policy: always
    command:
      - serena
      - start-mcp-server
      - --context
      - ide
      - --project
      - /workspace
      - --transport
      - sse
      - --host
      - 0.0.0.0
      - --port
      - "9121"
    volumes:
      - type: bind
        source: ..
        target: /workspace
        read_only: true
      - type: bind
        source: ../.serena
        target: /workspace/.serena
        read_only: false
    ports:
      - "127.0.0.1:9121:9121"
    networks:
      - ai-tools-internal
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c", "import socket; s=socket.socket(); s.settimeout(2); s.connect(('localhost', 9121)); s.close()"]
      interval: 30s
      timeout: 5s
      retries: 3

  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    pull_policy: always
    command:
      - --model
      - ollama/${OLLAMA_MODEL:-qwen2.5-coder:1.5b}
      - --port
      - "4000"
      - --host
      - 0.0.0.0
      - --drop_params
    environment:
      OLLAMA_API_BASE: http://host.docker.internal:11434
    ports:
      - "127.0.0.1:4000:4000"
    networks:
      - ai-tools-internal
    depends_on:
      - ollama-tools
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  ollama-tools:
    image: ollama/ollama:latest
    pull_policy: never # Ollama should be managed/updated by the user, not auto-pulled
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "127.0.0.1:11435:11434"
    networks:
      - ai-tools-internal
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 5s
      retries: 3

  codebase-memory-mcp:
    container_name: codebase-memory-mcp
    image: cbm-image
    build:
      context: ..
      dockerfile: infra/docker/Dockerfile.cbm
    command: ["--ui=true", "--port=9749"]
    environment:
      - CBM_CACHE_DIR=/root/.cache/codebase-memory-mcp
    # CRITICAL: Keeps the stdio server alive to serve the UI 24/7
    stdin_open: true 
    tty: true        
    ports:
      - "127.0.0.1:9749:9750" # Host 9749 routes to the internal socat bridge on 9750
    volumes:
      - type: bind
        source: ..
        target: /workspace
        read_only: true
      - cbm_cache:/root/.cache/codebase-memory-mcp
    networks:
      - ai-tools-internal
    restart: unless-stopped

volumes:
  ollama_data:
    external: true
    name: infra_ollama_data
  cbm_cache: # Let Docker Compose manage the isolated SQLite volume

networks:
  ai-tools-internal:
    driver: bridge