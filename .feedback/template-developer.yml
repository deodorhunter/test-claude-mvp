# Framework Testing Feedback — Developer
#
# For: Developers, tech leads, architects testing the framework on their codebases
# Store as: .feedback/YYYYMMDDTHHmmss-developer-[initials].yml (to avoid merge conflicts)
# Submit via: Pull Request with files in .feedback/ directory, label: framework-feedback

version: "3.0"  # Framework version tested against
tested_commit: ""  # Git commit hash of framework (run: git rev-parse HEAD)
timestamp: ""  # When feedback collected (ISO 8601: 2026-03-31T14:30:00Z)

tester:
  role: developer | tech-lead | architect
  experience: first-time | "2-3 sessions" | experienced
  team_size: solo | "2-5" | "5-20" | enterprise
  project_type: web-backend | ml-infrastructure | data-pipeline | plugin-system | other
  codebase_loc: ~0  # rough estimate: 5k | 50k | 500k | 1M+ lines of code

us_tested:
  id_or_name: "US-001 or 'auth-redesign' or 'bug-fix-quota'"
  description: "One-line summary of what was implemented"
  complexity: simple | medium | complex
  domain: backend | frontend | infra | security | testing | documentation

metrics:
  tokens_consumed: ~0  # total tokens from Claude API or Ollama inference
  baseline_tokens: ~0  # tokens WITHOUT framework (if measured), or "not measured"
  duration_minutes: ~0  # wall-clock time from brief to acceptance
  iterations_before_success: ~0  # how many agent runs before AC met
  qa_bouncebacks: 0  # failed judge or QA reviews
  rules_triggered:
    - rule-001-tenant-isolation
    # - rule-NNN-name (list any rules that caught issues)

findings:
  what_worked_excellently:
    - "Example: Serena saved ~8k tokens on symbol lookups vs full file reads"
    - ""
  
  what_was_unclear:
    - "Example: Rule-009 priority — when is get_symbols_overview vs find_symbol?"
    - ""
  
  what_didnt_fit:
    - "Example: Phase gates assume multi-phase features; doesn't fit bug fixes"
    - ""
  
  suggestions_for_framework:
    - "Example: Add Speed 1 'quick mode' — the orchestrator feels heavy for 10-line fixes"
    - ""

context:
  codebase_sensitivity: low | medium | high  # proprietary data, customer PII, etc
  regulatory_context: ""  # if any: "GDPR only", "SOC2", "HIPAA", etc
  team_location: ""  # geographic distribution relevant to framework testing

contact_email: ""  # optional — if you want follow-up discussion
